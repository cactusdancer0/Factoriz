<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factorización PRO | Master Edition</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-gold: #fbbf24;
            --accent-blue: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            margin: 0; background: var(--bg-dark); 
            color: var(--text-main); line-height: 1.6; 
        }

        header { 
            text-align: center; padding: 3rem 1rem; 
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid rgba(251, 191, 36, 0.2);
        }

        h1 { margin: 0; font-size: 2.2rem; color: var(--accent-gold); letter-spacing: -1px; }
        header p { color: var(--text-dim); margin-top: 0.5rem; font-size: 0.9rem; }

        nav { 
            display: flex; justify-content: center; gap: 15px; padding: 15px; 
            position: sticky; top: 0; background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(8px); z-index: 100; border-bottom: 1px solid var(--border);
        }

        button {
            padding: 10px 20px; border: none; border-radius: 6px; 
            font-weight: 600; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-size: 0.8rem;
        }

        .btn-nav { background: transparent; color: var(--text-main); border: 1px solid var(--border); }
        .btn-nav.active-btn { background: var(--accent-gold); color: var(--bg-dark); border-color: var(--accent-gold); }
        
        .btn-action { background: var(--accent-blue); color: var(--bg-dark); }
        .btn-verify { background: var(--success); color: var(--bg-dark); }
        .btn-sol { background: transparent; color: var(--accent-blue); border: 1px solid var(--accent-blue); }

        section { display: none; max-width: 950px; margin: 30px auto; padding: 0 20px; animation: fadeIn 0.4s ease; }
        .active-section { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        details { 
            background: var(--card-bg); border-radius: 10px; 
            margin-bottom: 12px; border: 1px solid var(--border); overflow: hidden;
        }
        summary { 
            padding: 18px; font-weight: 700; cursor: pointer; list-style: none;
            display: flex; justify-content: space-between; align-items: center;
            color: var(--text-main); border-left: 4px solid transparent;
        }
        details[open] summary { border-left-color: var(--accent-gold); background: rgba(255,255,255,0.03); }
        
        .content { padding: 20px; border-top: 1px solid var(--border); }
        
        .section-label { 
            color: var(--accent-blue); font-size: 0.7rem; font-weight: 800; 
            text-transform: uppercase; margin: 15px 0 5px 0; display: block; letter-spacing: 1px;
        }

        .teoria-text { color: var(--text-main); margin-bottom: 15px; font-size: 0.95rem; }
        
        .extra-narrativa { 
            background: rgba(251, 191, 36, 0.05); border: 1px dashed rgba(251, 191, 36, 0.3);
            padding: 15px; border-radius: 8px; margin: 15px 0; color: var(--text-dim); font-size: 0.9rem;
        }

        .ejemplo-box { 
            background: #000; padding: 15px; border-radius: 6px; 
            font-family: 'Consolas', monospace; color: var(--success); border: 1px solid var(--border);
        }

        .card-practica { background: var(--card-bg); padding: 30px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
        #exp { font-size: 2.5rem; margin-bottom: 25px; color: var(--text-main); font-weight: 800; }
        input { 
            width: 90%; max-width: 450px; padding: 15px; font-size: 1.3rem; background: var(--bg-dark); 
            border: 2px solid var(--border); border-radius: 10px; color: var(--accent-gold);
            text-align: center; margin-bottom: 20px;
        }

        .paso-explicacion { text-align: left; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px; margin-top: 20px; border: 1px solid var(--border); }
        .step-item { border-left: 2px solid var(--accent-blue); padding-left: 15px; margin-bottom: 12px; color: var(--text-main); }
    </style>
</head>
<body>

<header>
    <h1>Factorización PRO</h1>

</header>

<nav>
    <button id="btn-lib" class="btn-nav active-btn" onclick="mostrar('aprender')">Biblioteca Técnica</button>
    <button id="btn-pract" class="btn-nav" onclick="mostrar('practicar')">Entrenamiento</button>
</nav>

<section id="aprender" class="active-section">
    <div id="biblioteca-target"></div>
</section>

<section id="practicar">
    <div class="card-practica">
        <div id="exp">---</div>
        <input type="text" id="resp" placeholder="Resultado (ej: (x+2)(x-3) o 3x(x+1))" autocomplete="off">
        
        <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
            <button class="btn-action" onclick="generar()">Nuevo Reto</button>
            <button class="btn-verify" onclick="verificar()">Verificar</button>
            <button class="btn-sol" onclick="mostrarSolucion()">Análisis Paso a Paso</button>
        </div>

        <p id="msg" style="margin-top: 20px; font-weight: bold;"></p>

        <div id="solucion-area" class="paso-explicacion" style="display: none;">
            <h3 id="sol-tipo" style="color: var(--accent-gold); margin-top: 0; font-size: 1.1rem;"></h3>
            <div id="sol-narrativa" class="extra-narrativa"></div>
            <div id="sol-pasos"></div>
        </div>
    </div>
</section>

<script>
    const casos = [
        {
            t: "Factor Común Monomio",
            teoria: "Identificación de un divisor común (máximo común divisor) presente en todos los términos del polinomio.",
            est: "Detectar MCD numérico y variables con su menor exponente compartido.",
            nar: "Busca el 'apellido común'. Si todos tienen 'x', sacas 'x'. Si todos son múltiplos de 5, sacas el 5.",
            ej: "6x² + 3x = 3x(2x + 1)"
        },
        {
            t: "Factor Común por Agrupación",
            teoria: "Segmentación del polinomio en grupos con factores comunes locales para inducir un binomio factorizable global.",
            est: "Agrupar términos (usualmente 4) para obtener paréntesis idénticos.",
            nar: "Divide el problema en dos parejas. Factoriza cada una y verás aparecer un paréntesis repetido mágicamente.",
            ej: "x³ + x² + 2x + 2 = x²(x + 1) + 2(x + 1) = (x + 1)(x² + 2)"
        },
        {
            t: "Trinomio Cuadrado Perfecto",
            teoria: "Trinomio que resulta de elevar al cuadrado un binomio: (a ± b)² = a² ± 2ab + b².",
            est: "Confirmar que extremos sean cuadrados y el centro sea el doble producto de sus raíces.",
            nar: "Es un espejo. Las raíces de las esquinas multiplicadas por 2 deben darte exactamente el número central.",
            ej: "x² + 10x + 25 = (x + 5)²"
        },
        {
            t: "Diferencia de Cuadrados",
            teoria: "Binomios conjugados resultantes de la resta de dos cuadrados: a² - b² = (a + b)(a - b).",
            est: "Reconocer una resta entre dos potencias pares o cuadrados perfectos.",
            nar: "Si ves una resta y ambos tienen raíz cuadrada, abre dos paréntesis: uno suma y otro resta.",
            ej: "x² - 49 = (x + 7)(x - 7)"
        },
        {
            t: "Trinomio x² + bx + c",
            teoria: "Polinomio cuadrático con coeficiente principal 1 que se descompone en binomios con término común.",
            est: "Hallar dos números que sumados den 'b' y multiplicados den 'c'.",
            nar: "El juego de los números. Si el último es positivo, sumas; si es negativo, restas para hallar el centro.",
            ej: "x² + 7x + 12 = (x + 3)(x + 4)"
        },
        {
            t: "Trinomio ax² + bx + c",
            teoria: "Trinomio cuadrático con coeficiente principal 'a' diferente de 1.",
            est: "Usar método de aspa simple o multiplicación/división por el coeficiente 'a'.",
            nar: "Aquí la 'x' no está sola. Debes repartir el número inicial entre los factores con cuidado.",
            ej: "2x² + 5x + 2 = (2x + 1)(x + 2)"
        },
        {
            t: "Suma de Cubos",
            teoria: "Identidad para potencias de grado 3: a³ + b³ = (a + b)(a² - ab + b²).",
            est: "Extraer raíz cúbica de ambos términos y aplicar la estructura del trinomio.",
            nar: "Receta fija: un paréntesis corto con la suma y uno largo con cuadrados y resta en medio.",
            ej: "x³ + 8 = (x + 2)(x² - 2x + 4)"
        },
        {
            t: "Diferencia de Cubos",
            teoria: "Identidad para potencias de grado 3: a³ - b³ = (a - b)(a² + ab + b²).",
            est: "Igual que la suma de cubos, pero el signo inicial es resta.",
            nar: "Binomio corto resta, trinomio largo todo suma. No hay pierde.",
            ej: "x³ - 27 = (x - 3)(x² + 3x + 9)"
        },
        {
            t: "Suma o Diferencia de Potencias Iguales",
            teoria: "Generalización para n impar: xⁿ ± aⁿ.",
            est: "Dividir por la suma o diferencia de raíces y seguir la progresión de exponentes.",
            nar: "Caso para exponentes altos como x⁵. Los exponentes de uno bajan mientras los del otro suben.",
            ej: "x⁵ + 32 = (x + 2)(x⁴ - 2x³ + 4x² - 8x + 16)"
        },
        {
            t: "TCP por Adición y Sustracción",
            teoria: "Completar un trinomio para que sea cuadrado perfecto y compensar restando lo añadido.",
            est: "Añadir el término faltante para el doble producto y resolver como diferencia de cuadrados.",
            nar: "Cuando te falta 'un poquito' para el caso 3. Lo pones, pero lo restas al final para no hacer trampa.",
            ej: "x⁴ + x² + 1 = (x² + x + 1)(x² - x + 1)"
        }
    ];

    // Cargar Biblioteca
    const target = document.getElementById("biblioteca-target");
    casos.forEach((c, i) => {
        target.innerHTML += `
            <details>
                <summary><span>${i+1}. ${c.t}</span></summary>
                <div class="content">
                    <span class="section-label">Teoría Técnica</span>
                    <p class="teoria-text">${c.teoria}</p>
                    <span class="section-label">Estrategia</span>
                    <p class="teoria-text"><strong>${c.est}</strong></p>
                    <div class="extra-narrativa"><b>Narrativa Maestro:</b> ${c.nar}</div>
                    <span class="section-label">Ejemplo</span>
                    <div class="ejemplo-box">${c.ej}</div>
                </div>
            </details>
        `;
    });

    // Navegación
    function mostrar(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active-btn'));
        document.getElementById(id).classList.add('active-section');
        if(id === 'aprender') document.getElementById('btn-lib').classList.add('active-btn');
        else document.getElementById('btn-pract').classList.add('active-btn');
    }

    let actual = {};

    function generar() {
        document.getElementById("solucion-area").style.display = "none";
        document.getElementById("msg").innerText = "";
        document.getElementById("resp").value = "";
        
        const tipo = Math.floor(Math.random() * 10);
        const a = Math.floor(Math.random() * 5) + 1;
        const b = Math.floor(Math.random() * 5) + 1;

        switch(tipo) {
            case 0: // Monomio
                let f1 = Math.floor(Math.random()*4)+2;
                actual = { exp: `${f1}x² + ${f1*a}x`, res: `${f1}x(x+${a})`, t: "Factor Común Monomio", nar: "Identificamos el MCD del número y la potencia más baja de x.", pasos: [`MCD numérico: ${f1}`, `MCD literal: x`, `Dividimos cada término: ${f1}x²/ ${f1}x = x; ${f1*a}x/ ${f1}x = ${a}`] };
                break;
            case 1: // Agrupación
                actual = { exp: `x³ + x² + ${a}x + ${a}`, res: `(x+1)(x²+${a})`, t: "Factor Común por Agrupación", nar: "Separamos en dos grupos para encontrar un binomio repetido.", pasos: [`Grupo 1: (x³+x²) → x²(x+1)`, `Grupo 2: (${a}x+${a}) → ${a}(x+1)`, `Factor común global: (x+1)`] };
                break;
            case 2: // TCP
                actual = { exp: `x² + ${2*a}x + ${a*a}`, res: `(x+${a})²`, t: "Trinomio Cuadrado Perfecto", nar: "Verificamos raíces en los extremos.", pasos: [`Raíz de x² es x`, `Raíz de ${a*a} es ${a}`, `Doble producto: 2 * x * ${a} = ${2*a}x (Correcto)`] };
                break;
            case 3: // Diferencia Cuadrados
                let sq = a*a;
                actual = { exp: `x² - ${sq}`, res: `(x+${a})(x-${a})`, t: "Diferencia de Cuadrados", nar: "Resta de dos cosas con raíz cuadrada exacta.", pasos: [`Raíz 1: x`, `Raíz 2: ${a}`, `Resultado: (suma)(resta)`] };
                break;
            case 4: // x2+bx+c
                actual = { exp: `x² + ${a+b}x + ${a*b}`, res: `(x+${a})(x+${b})`, t: "Trinomio x² + bx + c", nar: "Buscamos pareja de números: suma y producto.", pasos: [`Buscamos números que sumen ${a+b}`, `Que multipliquen ${a*b}`, `Números hallados: ${a} y ${b}`] };
                break;
            case 5: // ax2+bx+c
                actual = { exp: `2x² + ${2*a+1}x + ${a}`, res: `(2x+1)(x+${a})`, t: "Trinomio ax² + bx + c", nar: "Factorización de trinomio con coeficiente principal.", pasos: [`Repartimos el coeficiente 2`, `Buscamos factores del cruce`, `Resultado: (2x+1)(x+${a})`] };
                break;
            case 6: // Suma Cubos
                actual = { exp: `x³ + ${a**3}`, res: `(x+${a})(x²-${a}x+${a*a})`, t: "Suma de Cubos", nar: "Aplicamos fórmula a³+b³.", pasos: [`Raíz cúbica 1: x`, `Raíz cúbica 2: ${a}`, `Trinomio: x² - (${a}*x) + ${a*a}`] };
                break;
            case 7: // Resta Cubos
                actual = { exp: `x³ - ${a**3}`, res: `(x-${a})(x²+${a}x+${a*a})`, t: "Diferencia de Cubos", nar: "Aplicamos fórmula a³-b³.", pasos: [`Raíz cúbica 1: x`, `Raíz cúbica 2: ${a}`, `Trinomio: x² + (${a}*x) + ${a*a}`] };
                break;
            case 8: // Potencias iguales
                actual = { exp: `x⁴ - ${a**4}`, res: `(x²+${a*a})(x+${a})(x-${a})`, t: "Diferencia de Potencias Cuartas", nar: "Descomposición sucesiva de cuadrados.", pasos: [`Paso 1: (x²+${a*a})(x²-${a*a})`, `Paso 2: Factorizar la diferencia restante`, `Resultado completo: (x²+${a*a})(x+${a})(x-${a})`] };
                break;
            case 9: // Especial (TCP adición)
                actual = { exp: `x⁴ + x² + 1`, res: `(x²+x+1)(x²-x+1)`, t: "TCP Especial", nar: "Completamos el cuadrado y restamos.", pasos: [`Añadimos x² para tener 2x²`, `Restamos x² al final`, `Diferencia de cuadrados resultante`] };
                break;
        }
        document.getElementById("exp").innerHTML = actual.exp.replace(/x(\d+)/g, "x<sup>$1</sup>");
    }

    function verificar() {
        let u = document.getElementById("resp").value.replace(/\s/g, "").toLowerCase();
        let r = actual.res.replace(/\s/g, "").toLowerCase();
        let rAlt = r.split(')(').reverse().join(')(');
        if(u === r || u === rAlt || u === r.replace(')²', ')^2')) {
            document.getElementById("msg").innerHTML = "✓ Logrado";
            document.getElementById("msg").style.color = "var(--success)";
        } else {
            document.getElementById("msg").innerHTML = "× Revisa los factores";
            document.getElementById("msg").style.color = "var(--error)";
        }
    }

    function mostrarSolucion() {
        document.getElementById("solucion-area").style.display = "block";
        document.getElementById("sol-tipo").innerText = actual.t;
        document.getElementById("sol-narrativa").innerHTML = "<b>Lógica:</b> " + actual.nar;
        let h = "";
        actual.pasos.forEach(p => h += `<div class="step-item">${p}</div>`);
        h += `<div style="color:var(--accent-gold); margin-top:15px; font-weight:bold;">Resultado: ${actual.res}</div>`;
        document.getElementById("sol-pasos").innerHTML = h;
    }

    generar();
</script>
</body>
</html>
